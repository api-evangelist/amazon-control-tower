id: https://api-evangelist.github.io/amazon-control-tower/capabilities/shared/control-tower.yaml
name: AWS Control Tower API
description: Naftiko shared capability definition for AWS Control Tower API, providing programmatic access to landing zones, controls (guardrails), and baselines for multi-account governance.
version: 1.0.0-alpha1
specificationVersion: 1.0.0-alpha1

provider:
  name: Amazon Web Services
  url: https://aws.amazon.com

tags:
  - AWS
  - Governance
  - Landing Zone
  - Controls
  - Baselines
  - Multi-Account

rest:
  port: 8100
  baseURL: https://controltower.amazonaws.com
  auth:
    type: aws-signature-v4
    service: controltower
  resources:
    - name: Landing Zones
      description: Manage AWS Control Tower landing zones
      operations:
        - operationId: createLandingZone
          summary: Create Landing Zone
          method: POST
          path: /create-landingzone
        - operationId: deleteLandingZone
          summary: Delete Landing Zone
          method: POST
          path: /delete-landingzone
        - operationId: getLandingZone
          summary: Get Landing Zone
          method: POST
          path: /get-landingzone
        - operationId: listLandingZones
          summary: List Landing Zones
          method: POST
          path: /list-landingzones
        - operationId: updateLandingZone
          summary: Update Landing Zone
          method: POST
          path: /update-landingzone
        - operationId: resetLandingZone
          summary: Reset Landing Zone
          method: POST
          path: /reset-landingzone
        - operationId: getLandingZoneOperation
          summary: Get Landing Zone Operation
          method: POST
          path: /get-landingzone-operation
        - operationId: listLandingZoneOperations
          summary: List Landing Zone Operations
          method: POST
          path: /list-landingzone-operations
    - name: Controls
      description: Manage AWS Control Tower controls (guardrails)
      operations:
        - operationId: enableControl
          summary: Enable Control
          method: POST
          path: /enable-control
        - operationId: disableControl
          summary: Disable Control
          method: POST
          path: /disable-control
        - operationId: getEnabledControl
          summary: Get Enabled Control
          method: POST
          path: /get-enabled-control
        - operationId: listEnabledControls
          summary: List Enabled Controls
          method: POST
          path: /list-enabled-controls
        - operationId: updateEnabledControl
          summary: Update Enabled Control
          method: POST
          path: /update-enabled-control
        - operationId: resetEnabledControl
          summary: Reset Enabled Control
          method: POST
          path: /reset-enabled-control
        - operationId: getControlOperation
          summary: Get Control Operation
          method: POST
          path: /get-control-operation
        - operationId: listControlOperations
          summary: List Control Operations
          method: POST
          path: /list-control-operations
    - name: Baselines
      description: Manage AWS Control Tower baselines for organizational units
      operations:
        - operationId: enableBaseline
          summary: Enable Baseline
          method: POST
          path: /enable-baseline
        - operationId: disableBaseline
          summary: Disable Baseline
          method: POST
          path: /disable-baseline
        - operationId: getBaseline
          summary: Get Baseline
          method: POST
          path: /get-baseline
        - operationId: listBaselines
          summary: List Baselines
          method: POST
          path: /list-baselines
        - operationId: getEnabledBaseline
          summary: Get Enabled Baseline
          method: POST
          path: /get-enabled-baseline
        - operationId: listEnabledBaselines
          summary: List Enabled Baselines
          method: POST
          path: /list-enabled-baselines
        - operationId: updateEnabledBaseline
          summary: Update Enabled Baseline
          method: POST
          path: /update-enabled-baseline
        - operationId: resetEnabledBaseline
          summary: Reset Enabled Baseline
          method: POST
          path: /reset-enabled-baseline
        - operationId: getBaselineOperation
          summary: Get Baseline Operation
          method: POST
          path: /get-baseline-operation
    - name: Tags
      description: Manage tags on Control Tower resources
      operations:
        - operationId: listTagsForResource
          summary: List Tags for Resource
          method: GET
          path: /tags/{resourceArn}
        - operationId: tagResource
          summary: Tag Resource
          method: POST
          path: /tags/{resourceArn}
        - operationId: untagResource
          summary: Untag Resource
          method: DELETE
          path: /tags/{resourceArn}

mcp:
  port: 9100
  tools:
    - name: create_landing_zone
      description: Create a new AWS Control Tower landing zone
      operationId: createLandingZone
    - name: delete_landing_zone
      description: Delete an AWS Control Tower landing zone
      operationId: deleteLandingZone
    - name: get_landing_zone
      description: Get details of an AWS Control Tower landing zone
      operationId: getLandingZone
    - name: list_landing_zones
      description: List all AWS Control Tower landing zones
      operationId: listLandingZones
    - name: update_landing_zone
      description: Update an AWS Control Tower landing zone
      operationId: updateLandingZone
    - name: reset_landing_zone
      description: Reset an AWS Control Tower landing zone
      operationId: resetLandingZone
    - name: enable_control
      description: Enable a control on an organizational unit
      operationId: enableControl
    - name: disable_control
      description: Disable a control on an organizational unit
      operationId: disableControl
    - name: list_enabled_controls
      description: List enabled controls on organizational units
      operationId: listEnabledControls
    - name: update_enabled_control
      description: Update an enabled control configuration
      operationId: updateEnabledControl
    - name: enable_baseline
      description: Enable a baseline on an organizational unit
      operationId: enableBaseline
    - name: disable_baseline
      description: Disable a baseline on an organizational unit
      operationId: disableBaseline
    - name: list_baselines
      description: List all available baselines
      operationId: listBaselines
    - name: list_enabled_baselines
      description: List baselines enabled on organizational units
      operationId: listEnabledBaselines
    - name: list_tags_for_resource
      description: List tags for a Control Tower resource
      operationId: listTagsForResource
