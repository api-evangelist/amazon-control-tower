components:
  securitySchemes:
    aws_signature:
      type: http
      scheme: bearer
      description: >-
        AWS Signature Version 4 authentication. Requests must be signed using
        IAM credentials with appropriate AWS Control Tower permissions.
  schemas:
    Error:
      type: object
      description: An AWS Control Tower API error response.
      properties:
        message:
          type: string
          description: The error message.
          example: The specified resource was not found.
        code:
          type: string
          description: The error code.
          example: ResourceNotFoundException
    LandingZone:
      type: object
      description: An AWS Control Tower landing zone.
      properties:
        arn:
          type: string
          description: The ARN of the landing zone.
          example: arn:aws:controltower:us-east-1:123456789012:landingzone/a1b2c3d4EXAMPLE
        driftStatus:
          type: object
          description: The drift status of the landing zone.
          properties:
            status:
              type: string
              enum:
                - DRIFTED
                - IN_SYNC
                - NOT_CHECKING_FOR_DRIFT
                - UNKNOWN
        latestAvailableVersion:
          type: string
          description: The latest available version of the landing zone.
          example: "3.3"
        manifest:
          type: object
          description: The landing zone manifest document.
        status:
          type: string
          description: The landing zone deployment status.
          enum:
            - ACTIVE
            - PROCESSING
            - FAILED
          example: ACTIVE
        version:
          type: string
          description: The current deployed version of the landing zone.
          example: "3.3"
    LandingZoneSummary:
      type: object
      description: Summary information about a landing zone.
      properties:
        arn:
          type: string
          description: The ARN of the landing zone.
          example: arn:aws:controltower:us-east-1:123456789012:landingzone/a1b2c3d4EXAMPLE
    LandingZoneOperationDetail:
      type: object
      description: Information about a landing zone operation.
      properties:
        endTime:
          type: string
          format: date-time
          description: The time the operation completed.
        operationIdentifier:
          type: string
          description: The unique identifier of the operation.
        operationType:
          type: string
          description: The type of landing zone operation.
          enum:
            - CREATE
            - UPDATE
            - RESET
            - DELETE
        startTime:
          type: string
          format: date-time
          description: The time the operation was initiated.
        status:
          type: string
          description: The status of the operation.
          enum:
            - SUCCEEDED
            - FAILED
            - IN_PROGRESS
          example: SUCCEEDED
        statusMessage:
          type: string
          description: If the operation result is FAILED, this string contains a message explaining why.
    LandingZoneOperationSummary:
      type: object
      description: Summary of a landing zone operation.
      properties:
        operationIdentifier:
          type: string
          description: The unique identifier of the operation.
        operationType:
          type: string
          description: The type of the operation.
        startTime:
          type: string
          format: date-time
        status:
          type: string
          enum:
            - SUCCEEDED
            - FAILED
            - IN_PROGRESS
    CreateLandingZoneRequest:
      type: object
      required:
        - manifest
        - version
      properties:
        manifest:
          type: object
          description: The landing zone manifest document, a YAML expressible input type.
        version:
          type: string
          description: The landing zone version, for example, 3.3.
          example: "3.3"
        tags:
          type: object
          description: Tags to apply to the landing zone.
          additionalProperties:
            type: string
    CreateLandingZoneResponse:
      type: object
      properties:
        arn:
          type: string
          description: The ARN of the landing zone resource.
          example: arn:aws:controltower:us-east-1:123456789012:landingzone/a1b2c3d4EXAMPLE
        operationIdentifier:
          type: string
          description: A unique identifier assigned to a CreateLandingZone operation.
          example: a1b2c3d4-5678-90ab-cdef-EXAMPLE11111
    DeleteLandingZoneResponse:
      type: object
      properties:
        operationIdentifier:
          type: string
          description: A unique identifier assigned to a DeleteLandingZone operation.
          example: a1b2c3d4-5678-90ab-cdef-EXAMPLE22222
    GetLandingZoneResponse:
      type: object
      properties:
        landingZone:
          $ref: "#/components/schemas/LandingZone"
    ListLandingZonesResponse:
      type: object
      properties:
        landingZones:
          type: array
          items:
            $ref: "#/components/schemas/LandingZoneSummary"
        nextToken:
          type: string
    UpdateLandingZoneRequest:
      type: object
      required:
        - landingZoneIdentifier
        - manifest
        - version
      properties:
        landingZoneIdentifier:
          type: string
          description: The identifier of the landing zone.
          example: arn:aws:controltower:us-east-1:123456789012:landingzone/a1b2c3d4EXAMPLE
        manifest:
          type: object
          description: The landing zone manifest document.
        version:
          type: string
          description: The target landing zone version.
          example: "3.3"
    UpdateLandingZoneResponse:
      type: object
      properties:
        operationIdentifier:
          type: string
          description: A unique identifier assigned to the UpdateLandingZone operation.
          example: a1b2c3d4-5678-90ab-cdef-EXAMPLE33333
    ResetLandingZoneResponse:
      type: object
      properties:
        operationIdentifier:
          type: string
          description: A unique identifier assigned to the ResetLandingZone operation.
          example: a1b2c3d4-5678-90ab-cdef-EXAMPLE44444
    GetLandingZoneOperationResponse:
      type: object
      properties:
        operationDetails:
          $ref: "#/components/schemas/LandingZoneOperationDetail"
    ListLandingZoneOperationsResponse:
      type: object
      properties:
        landingZoneOperations:
          type: array
          items:
            $ref: "#/components/schemas/LandingZoneOperationSummary"
        nextToken:
          type: string
    EnabledControlParameter:
      type: object
      description: A key-value pair for a control parameter.
      required:
        - key
        - value
      properties:
        key:
          type: string
          description: The parameter key.
          example: AllowedRegions
        value:
          description: The parameter value.
    EnableControlRequest:
      type: object
      required:
        - controlIdentifier
        - targetIdentifier
      properties:
        controlIdentifier:
          type: string
          description: The ARN of the control. Only Strongly recommended and Elective controls are permitted.
          example: arn:aws:controltower:us-east-1::control/AWS-GR_ENCRYPTED_VOLUMES
        targetIdentifier:
          type: string
          description: The ARN of the organizational unit on which the control will be enabled.
          example: arn:aws:organizations::123456789012:ou/o-exampleorgid11/ou-exampleouid111
        parameters:
          type: array
          description: A list of input parameter values that are supplied to enable the control.
          items:
            $ref: "#/components/schemas/EnabledControlParameter"
        tags:
          type: object
          description: Tags to apply to the EnabledControl resource.
          additionalProperties:
            type: string
    EnableControlResponse:
      type: object
      properties:
        arn:
          type: string
          description: The ARN of the EnabledControl resource.
          example: arn:aws:controltower:us-east-1:123456789012:enabledcontrol/a1b2c3d4EXAMPLE
        operationIdentifier:
          type: string
          description: The identifier of the asynchronous operation.
          example: a1b2c3d4-5678-90ab-cdef-EXAMPLE55555
    DisableControlResponse:
      type: object
      properties:
        operationIdentifier:
          type: string
          description: The identifier of the asynchronous operation.
          example: a1b2c3d4-5678-90ab-cdef-EXAMPLE66666
    EnabledControl:
      type: object
